name: Deploy dashboard to Pages

# Builds the Next.js static export in web/ and publishes it to GitHub Pages.
#
# Push trigger fires on both `main` and `json-backend`:
#   - `main` is the long-term home of the migrated pipeline.
#   - `json-backend` is the active migration branch; listing it here lets
#     Pages deploys run today, and becomes a harmless no-op after that
#     branch is merged and deleted — no edits required post-merge.
#
# Note: `workflow_dispatch` and `workflow_run` below only fire from the
# repository's default branch (a GitHub Actions constraint), so the
# manual button and the collector chain won't be active until the
# workflow file lands on `main`. Direct pushes still trigger builds on
# either branch via the `push` event above.

on:
  push:
    branches: [main, json-backend]
    paths:
      - "web/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Collect LeetCode data"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip re-deploy if the collector run itself failed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f web/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Two variants of setup-node: one with npm cache when a lockfile is
      # present, one without (setup-node errors out if cache-dependency-path
      # points at a non-existent file). Run `npm install` locally in web/
      # and commit the resulting package-lock.json to enable caching.
      - name: Set up Node (with cache)
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Node (no cache)
        if: steps.lockfile.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build static export
        working-directory: web
        env:
          # GitHub Pages project sites are served from /<repo>/. Derive it
          # automatically so forks don't need to hardcode the name.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Disable Jekyll
        run: touch web/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
