name: Collect LeetCode data

# Scheduler + collector. Pulls the roster from Google Sheets, hits the LeetCode
# GraphQL API for each member, writes JSON into data/, and commits the diff
# back to main. The deploy workflow is triggered automatically by the push.

on:
  schedule:
    # 07:15 UTC daily. Early enough to beat most manual checks in the Americas.
    - cron: "15 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch but do not commit"
        required: false
        default: "false"

concurrency:
  group: collect-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run collector
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LOG_LEVEL: INFO
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/collect.py --dry-run
          else
            python scripts/collect.py
          fi

      - name: Validate written data
        run: python scripts/validator.py

      - name: Commit updated data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "leetcode-dashboard-bot"
          git config user.email "leetcode-dashboard-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): daily collector refresh $(date -u +%Y-%m-%d)"
          git push
